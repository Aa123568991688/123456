name: Build jmj Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境（Spigot 插件需要 Java 17+）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 构建项目（Maven）
      - name: Build with Maven
        run: mvn -B clean package

      # 4. 上传构建产物（JAR 文件）
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jmj-plugin
          path: target/jmj-*.jar
